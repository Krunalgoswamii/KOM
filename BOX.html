<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Cricket by KD</title>
<style>

    .super-over-active { 
    background: linear-gradient(45deg, #f59e0b, #ef4444) !important; 
    color: white !important;
    animation: pulse 1.5s infinite;
}
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
#so-badge { 
    display: none; background: #ef4444; color: white; padding: 2px 10px; 
    border-radius: 20px; font-size: 12px; margin-bottom: 5px; 
}
:root { --primary: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #6366f1; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; display: flex; flex-direction: column; align-items: center; }
.container { width: 100%; max-width: 500px; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid #334155; margin-bottom: 20px; }
.team-section { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
input, select { background: #1e293b; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; margin-bottom: 8px; width: 100%; box-sizing: border-box; }
.btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; margin-bottom: 5px; }
.btn-primary { background: var(--primary); color: #000; font-size: 16px; }
.main-score { font-size: 50px; font-weight: 800; color: var(--primary); text-align: center; margin: 5px 0; }
.player-row { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid transparent; }
.active { border-left-color: var(--primary); background: #1e3a8a; }
.grid-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
.run { background: #334155; color: white; font-size: 18px; }
.wkt-btn { background: #ef4444; grid-column: span 2; color: white; }
.extra-btn { background: #f59e0b; color: black; }
.tabs { display: flex; gap: 5px; margin-top: 20px; }
.tab { flex: 1; padding: 10px; background: #334155; text-align: center; cursor: pointer; border-radius: 5px; font-size: 12px; }
.tab.active { background: var(--accent); }
.stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
.stats-table th { text-align: left; color: #888; border-bottom: 1px solid #334155; padding: 5px; }
.stats-table td { padding: 8px 5px; border-bottom: 1px solid #1e293b; }
.section-head { color: var(--primary); font-size: 12px; margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>

<div id="setup-screen" class="container">
<h2 style="text-align:center; color:var(--primary)">Team Entry</h2>
<div class="team-section">
<input type="text" id="t1-name" value="Team A">
<div id="t1-list"><input type="text" class="t1-p" value=""><input type="text" class="t1-p" value=""></div>
<button class="btn" style="background:#334155; color:var(--primary)" onclick="addField('t1-list', 't1-p')">+ Add Player</button>
</div>
<div class="team-section">
<input type="text" id="t2-name" value="Team B">
<div id="t2-list"><input type="text" class="t2-p" value=""><input type="text" class="t2-p" value=""></div>
<button class="btn" style="background:#334155; color:var(--primary)" onclick="addField('t2-list', 't2-p')">+ Add Player</button>
</div>
<div style="text-align:center">
Overs: <input type="number" id="max-overs" value="5" style="width:60px">
<button class="btn btn-primary" onclick="goToSelection()">NEXT</button>
</div>
</div>

<div id="selection-screen" class="container" style="display:none;">
<h2 id="sel-title" style="color:var(--accent); text-align:center">Innings Setup</h2>
<div class="team-section">
<label>Opener:</label><select id="s-select"></select>
<label>Non-Striker:</label><select id="ns-select"></select>
<label>Opening Bowler:</label><select id="b-select"></select>
</div>
<button class="btn btn-primary" onclick="startInnings()">START MATCH</button>
</div>
<div id="so-badge">SUPER OVER RUNNING</div>
<div id="game-screen" class="container" style="display:none;">
<div id="target-div" style="text-align:center; color:var(--primary); font-weight:bold; display:none"></div>
<div style="text-align:center">
<h3 id="live-team" style="margin:0"></h3>
<p class="main-score"><span id="runs">0</span> - <span id="wkts">0</span></p>
<p>Overs: <span id="ov">0.0</span> / <span id="max-ov-label">5</span></p>
</div>

<div id="p1-div" class="player-row active"><span id="p1-name"></span><span><strong id="p1-r">0</strong>(<span id="p1-b">0</span>)</span></div>
<div id="p2-div" class="player-row"><span id="p2-name"></span><span><strong id="p2-r">0</strong>(<span id="p2-b">0</span>)</span></div>

<div style="background:#0f172a; padding:10px; border-radius:10px; margin-bottom:10px; border: 1px solid #334155;">
Bowler: <select id="live-bowler" onchange="changeBowler()" style="width:auto; margin:0"></select>
</div>

<div class="grid-btns">
<button class="btn run" onclick="addBall(0)">0</button>
<button class="btn run" onclick="addBall(1)">1</button>
<button class="btn run" onclick="addBall(2)">2</button>
<button class="btn run" onclick="addBall(4)">4</button>
<button class="btn run" onclick="addBall(6)">6</button>
<button class="btn extra-btn" onclick="addExtra()">WD/NB</button>
<button class="btn wkt-btn" onclick="takeWicket()">WICKET</button>
<button class="btn" style="background:#6366f1; grid-column:span 2" onclick="manualSwap()">SWAP STRIKE ⚡</button>
<button class="btn" style="background:#64748b; grid-column:span 2" onclick="undo()">UNDO ↩</button>
</div>

<div class="tabs">
<div id="tab1" class="tab active" onclick="showScore(1)">1st Innings</div>
<div id="tab2" class="tab" onclick="showScore(2)">2nd Innings</div>
</div>
<div id="scorecard-view">
<div class="section-head">BATTING</div>
<table class="stats-table">
<thead><tr><th>Batsman</th><th>R</th><th>B</th><th>SR</th></tr></thead>
<tbody id="bat-body"></tbody>
</table>
<div class="section-head">BOWLING</div>
<table class="stats-table">
<thead><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Eco</th></tr></thead>
<tbody id="bowl-body"></tbody>
</table>
</div>
</div>

<div id="bowler-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;">
    <div class="container" style="margin-top:20%; border:2px solid var(--accent)">
        <h3>Select Next Bowler</h3>
        <select id="modal-bowler-select"></select>
        <button id="so-btn" class="btn" style="background:#f59e0b; color:black; margin-bottom:10px;" onclick="enableSuperOver()">START AS SUPER OVER ⚡</button>
        <button class="btn btn-primary" style="background:var(--accent); color:white" onclick="confirmNewBowler()">CONFIRM BOWLER</button>
    </div>
</div>

<div id="wkt-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;">
<div class="container" style="margin-top:20%; border:2px solid var(--primary)">
<h3>Wicket! Next Batsman?</h3>
<select id="next-player-select"></select>
<button class="btn btn-primary" onclick="confirmNewBatsman()">OK</button>
</div>
</div>

<div id="winner-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; overflow-y:auto; padding:20px 10px;">
    <div class="container" style="border:2px solid var(--primary); text-align:center;">
        <h1 id="winner-team-name" style="color:var(--primary); font-size:40px; margin-bottom:10px; text-shadow: 0 0 15px var(--primary);"></h1>
        <h3 id="victory-msg" style="color:var(--text); margin-bottom:20px;"></h3>
        
        <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
        
        <div id="final-stats-content">
            </div>

        <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;">NEW MATCH 🔄</button>
    </div>
</div>

<script>
let state = { 
    runs:0, wkts:0, balls:0, inn:1, maxOvers:5, t1Name:"", t2Name:"", t1P:[], t2P:[], target:null,
    isSuperOver: false,
    inn1SOConsumed: false,
    inn2SOConsumed: false,
    soRuns: 0,
    soWkts: 0
};
let inn1Data = { bat:[], bowl:{} }, inn2Data = { bat:[], bowl:{} };
let p1, p2, striker, currentBowler, lastBowler = "", history = [];

function addField(id, cls) {
let input = document.createElement('input');
input.className = cls; input.placeholder = "Player Name";
document.getElementById(id).appendChild(input);
}

function enableSuperOver() {
    let consumed = (state.inn === 1) ? state.inn1SOConsumed : state.inn2SOConsumed;
    if(consumed) {
        alert("Super Over is inning mein pehle hi use ho chuka hai!");
        return;
    }
    state.isSuperOver = true;
    document.getElementById('so-btn').classList.add('super-over-active');
    document.getElementById('so-btn').innerText = "SUPER OVER SELECTED!";
}

function goToSelection() {
state.t1Name = document.getElementById('t1-name').value;
state.t2Name = document.getElementById('t2-name').value;
state.maxOvers = parseInt(document.getElementById('max-overs').value);
state.t1P = Array.from(document.getElementsByClassName('t1-p')).map(i => i.value).filter(v => v);
state.t2P = Array.from(document.getElementsByClassName('t2-p')).map(i => i.value).filter(v => v);
if(state.t1P.length < 2 || state.t2P.length < 2) return alert("Min 2 players required!");
setupSelectionScreen();
document.getElementById('setup-screen').style.display = 'none';
document.getElementById('selection-screen').style.display = 'block';
}

function setupSelectionScreen() {
let batSquad = (state.inn === 1) ? state.t1P : state.t2P;
let bowlSquad = (state.inn === 1) ? state.t2P : state.t1P;
let batOpt = batSquad.map(p => `<option value="${p}">${p}</option>`).join('');
let bowlOpt = bowlSquad.map(p => `<option value="${p}">${p}</option>`).join('');
document.getElementById('sel-title').innerText = (state.inn===1?state.t1Name:state.t2Name) + " Innings Setup";
document.getElementById('s-select').innerHTML = batOpt;
document.getElementById('ns-select').innerHTML = batOpt;
document.getElementById('ns-select').selectedIndex = 1;
document.getElementById('b-select').innerHTML = bowlOpt;
}

function startInnings() {
    let s = document.getElementById('s-select').value;
    let ns = document.getElementById('ns-select').value;
    let b = document.getElementById('b-select').value; // Opening bowler
    if(s === ns) return alert("Select different players!");
    
    p1 = { name: s, r:0, b:0, out:false };
    p2 = { name: ns, r:0, b:0, out:false };
    striker = p1;
    currentBowler = b; // Shuruat wala bowler set karein
    lastBowler = "";
    
    updateBowlerList(); // List update karein
    document.getElementById('live-bowler').value = b; // Dropdown mein naam dikhayein
    
    document.getElementById('selection-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    updateUI();
}

function updateBowlerList() {
    let bowlSquad = (state.inn === 1) ? state.t2P : state.t1P;
    let availableBowlers = bowlSquad.filter(b => b !== lastBowler);
    
    let options = `<option value="">-- Select Bowler --</option>`;
    options += availableBowlers.map(p => `<option value="${p}">${p}</option>`).join('');
    
    document.getElementById('live-bowler').innerHTML = options;
    document.getElementById('live-bowler').value = ""; // Default empty
}

function addBall(r) {
    if (!currentBowler) { showBowlerModal(); return; }
    save();
    
    state.runs += r; 
    
    // LIVE UPDATE LOGIC
    if(state.isSuperOver) {
        state.soRuns += r;
        // Super over rule apply: score mein (r * 2) hona chahiye, 
        // 1x r pehle hi add ho chuka hai, toh 1x r aur add kar rahe hain.
        state.runs += r; 
    }

    state.balls++; 
    striker.r += r; 
    striker.b++;
    recordBowl(r, 1, 0);
    
    if(r%2 !== 0) swap();
    
    if(state.balls % 6 === 0 && state.balls > 0) {
        if(state.isSuperOver) {
            // Super over khatam hone par sirf flag reset karein
            state.isSuperOver = false;
            document.getElementById('so-badge').style.display = 'none';
            alert(`Super Over Samapt! \nNet Score Updated Live.`);
        }
        lastBowler = currentBowler;
        currentBowler = "";
        swap();
        showBowlerModal();
        document.getElementById('so-btn').classList.remove('super-over-active');
        document.getElementById('so-btn').innerText = "START AS SUPER OVER ⚡";
    }
    updateUI();
    checkInningsEnd();
}
function addExtra() { 
    if (!currentBowler || currentBowler === "") {
    alert("Kripya pehle naya bowler select karein!");
    return;
}
    save(); state.runs++; recordBowl(1, 0, 0); updateUI(); checkInningsEnd(); }

function recordBowl(r, b, w) {
let data = (state.inn === 1) ? inn1Data.bowl : inn2Data.bowl;
if(!data[currentBowler]) data[currentBowler] = {r:0, b:0, w:0};
data[currentBowler].r += r; data[currentBowler].b += b; data[currentBowler].w += w;
}

function swap() { striker = (striker === p1) ? p2 : p1; }

function takeWicket() {
    if (!currentBowler || currentBowler === "") { alert("Bowler select karein!"); return; }
    save();
    
    state.wkts++; 
    state.balls++; 
    striker.b++;   

    // LIVE UPDATE FOR WICKET IN SUPER OVER
    if(state.isSuperOver) {
        state.soWkts += 1;
        state.runs -= 5; // Direct -5 penalty
    }

    recordBowl(0, 1, 1);
    
    let data = (state.inn === 1) ? inn1Data : inn2Data;
    data.bat.push({...striker, out:true});

    if(state.balls % 6 === 0 && state.balls > 0) {
        if(state.isSuperOver) {
            state.isSuperOver = false;
            document.getElementById('so-badge').style.display = 'none';
        }
        lastBowler = currentBowler;
        currentBowler = "";
    }

    let squad = (state.inn === 1) ? state.t1P : state.t2P;
    let outNames = data.bat.map(p => p.name);
    let available = squad.filter(p => !outNames.includes(p) && p !== p1.name && p !== p2.name);

    if(state.wkts >= squad.length - 1 || available.length === 0) {
        if(state.isSuperOver) applySuperOverLogic();
        checkInningsEnd(true);
    } else {
        document.getElementById('next-player-select').innerHTML = available.map(p => `<option value="${p}">${p}</option>`).join('');
        document.getElementById('wkt-modal').style.display = 'block';
    }
    
    updateUI(); // Scoreboard turant update karne ke liye
    checkInningsEnd(); // Match end check karne ke liye
}
function applySuperOverLive(runsInBall, wicketsInBall) {
    if (state.isSuperOver) {
        // Super over ka impact calculate karein: (Runs * 2) - (Wkts * 5)
        let impact = (runsInBall * 2) - (wicketsInBall * 5);
        state.runs += (impact - runsInBall); // Original run already add ho chuka hota hai, isliye balance adjust karein
    }
}


function manualSwap() {
    save(); // Taki galti se dab jaye toh undo kar sakein
    swap();
    updateUI();
}

function confirmNewBatsman() {
    let nextName = document.getElementById('next-player-select').value;
    
    if (striker === p1) {
        p1 = { name: nextName, r: 0, b: 0, out: false };
        striker = p1; // Naye p1 ko striker banayein
    } else {
        p2 = { name: nextName, r: 0, b: 0, out: false };
        striker = p2; // Naye p2 ko striker banayein
    }
    
    document.getElementById('wkt-modal').style.display = 'none';
    updateUI();
}

function checkInningsEnd(allOut = false) {
if(state.inn === 2 && state.runs >= state.target) finishMatch(state.t2Name + " Wins!");
else if(allOut || (state.balls >= state.maxOvers * 6 && state.balls > 0)) {
if(state.inn === 1) {
    // Innings 1 khatam hone waale block ke andar ye add karein:
inn1Data.totalRuns = state.runs;
inn1Data.wkts = state.wkts;
state.target = state.runs + 1;
inn1Data.bat.push({...p1, out:false}, {...p2, out:false});
alert("Innings Over! Target: " + state.target);
state.inn = 2; state.runs = 0; state.wkts = 0; state.balls = 0;
document.getElementById('game-screen').style.display = 'none';
setupSelectionScreen();
document.getElementById('selection-screen').style.display = 'block';
} else {
let msg = state.runs >= state.target ? state.t2Name + " Wins!" : (state.runs === state.target-1 ? "Draw!" : state.t1Name + " Wins!");
finishMatch(msg);
}
}
}

function finishMatch(msg) {
    if(state.inn === 2) {
        // Current players ka data push karein scorecard ke liye
        if(!inn2Data.bat.find(x => x.name === p1.name)) inn2Data.bat.push({...p1, out:false});
        if(!inn2Data.bat.find(x => x.name === p2.name)) inn2Data.bat.push({...p2, out:false});
    }

    // Winner team ka naam nikalne ke liye logic
    let winner = "";
    if (state.runs >= state.target) {
        winner = state.t2Name;
    } else if (state.runs === state.target - 1) {
        winner = "MATCH DRAW";
    } else {
        winner = state.t1Name;
    }

    // Modal mein data bharna
    document.getElementById('winner-team-name').innerText = winner === "MATCH DRAW" ? "TIE! 🤝" : "👑 " + winner.toUpperCase() + " WINS!";
    document.getElementById('victory-msg').innerText = msg;
    
    // Dono innings ki summary taiyar karna
    let statsHtml = `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; text-align:left;">
            <div class="team-section">
                <h4 style="color:var(--primary); margin:0">${state.t1Name}</h4>
                <p style="font-size:20px; font-weight:bold; margin:5px 0;">${inn1Data.totalRuns || state.target - 1}/${inn1Data.wkts || 'All Out'}</p>
            </div>
            <div class="team-section">
                <h4 style="color:var(--accent); margin:0">${state.t2Name}</h4>
                <p style="font-size:20px; font-weight:bold; margin:5px 0;">${state.runs}/${state.wkts}</p>
            </div>
        </div>
    `;
    
    document.getElementById('final-stats-content').innerHTML = statsHtml;
    document.getElementById('winner-modal').style.display = 'block';
}

function updateUI() {
document.getElementById('runs').innerText = state.runs;
document.getElementById('wkts').innerText = state.wkts;
document.getElementById('ov').innerText = Math.floor(state.balls/6) + "." + (state.balls%6);
document.getElementById('max-ov-label').innerText = state.maxOvers;
document.getElementById('live-team').innerText = (state.inn===1 ? state.t1Name : state.t2Name).toUpperCase();
document.getElementById('p1-name').innerText = p1.name + (striker === p1 ? " *" : "");
document.getElementById('p1-r').innerText = p1.r; document.getElementById('p1-b').innerText = p1.b;
document.getElementById('p2-name').innerText = p2.name + (striker === p2 ? " *" : "");
document.getElementById('p2-r').innerText = p2.r; document.getElementById('p2-b').innerText = p2.b;
document.getElementById('p1-div').className = (striker === p1) ? 'player-row active' : 'player-row';
document.getElementById('p2-div').className = (striker === p2) ? 'player-row active' : 'player-row';
if(state.target) {
document.getElementById('target-div').style.display = 'block';
document.getElementById('target-div').innerText = `Target: ${state.target} (Need ${state.target-state.runs} in ${ (state.maxOvers*6)-state.balls } balls)`;
}
showScore(state.inn);
}

function showScore(n) {
document.getElementById('tab1').className = n===1 ? 'tab active' : 'tab';
document.getElementById('tab2').className = n===2 ? 'tab active' : 'tab';
let data = (n === 1) ? inn1Data : inn2Data;

// Batsman Logic: Show unique names only
let displayList = [];
data.bat.forEach(p => {
if(!displayList.find(x => x.name === p.name)) displayList.push(p);
});

// If it's the current inning, add playing batsmen to the view list
if(state.inn === n) {
if(!displayList.find(x => x.name === p1.name)) displayList.push({...p1});
else { // Update score of current player in display
let idx = displayList.findIndex(x => x.name === p1.name);
displayList[idx].r = p1.r; displayList[idx].b = p1.b; displayList[idx].out = false;
}
if(!displayList.find(x => x.name === p2.name)) displayList.push({...p2});
else {
let idx = displayList.findIndex(x => x.name === p2.name);
displayList[idx].r = p2.r; displayList[idx].b = p2.b; displayList[idx].out = false;
}
}

document.getElementById('bat-body').innerHTML = displayList.map(p => `<tr><td>${p.name}${p.out?' (o)':'*'}</td><td>${p.r}</td><td>${p.b}</td><td>${(p.r/p.b*100||0).toFixed(0)}</td></tr>`).join('');

// Bowling logic
let bowlHtml = "";
for(let b in data.bowl) {
let s = data.bowl[b];
let ov = Math.floor(s.b/6) + "." + (s.b%6);
let eco = s.b > 0 ? (s.r/(s.b/6)).toFixed(1) : "0.0";
bowlHtml += `<tr><td>${b}</td><td>${ov}</td><td>${s.r}</td><td>${s.w}</td><td>${eco}</td></tr>`;
}
document.getElementById('bowl-body').innerHTML = bowlHtml;
}

function changeBowler() {
    let selectedBowler = document.getElementById('live-bowler').value;
    
    if(selectedBowler === lastBowler) {
        alert("Same bowler lagatar do over nahi daal sakta!");
        document.getElementById('live-bowler').value = ""; // Selection reset karein
        currentBowler = "";
        return;
    }
    
    currentBowler = selectedBowler;
}

function showBowlerModal() {
    let bowlSquad = (state.inn === 1) ? state.t2P : state.t1P;
    let availableBowlers = bowlSquad.filter(b => b !== lastBowler);
    
    document.getElementById('modal-bowler-select').innerHTML = availableBowlers.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById('bowler-modal').style.display = 'block';
}

function confirmNewBowler() {
    let b = document.getElementById('modal-bowler-select').value;
    if(!b) return alert("Bowler select karein!");
    
    currentBowler = b;
    
    // Check if Super Over was selected
    if(state.isSuperOver) {
        document.getElementById('so-badge').style.display = 'inline-block';
        state.soRuns = 0;
        state.soWkts = 0;
        if(state.inn === 1) state.inn1SOConsumed = true;
        else state.inn2SOConsumed = true;
    } else {
        document.getElementById('so-badge').style.display = 'none';
    }

    updateBowlerList();
    document.getElementById('live-bowler').value = b;
    document.getElementById('bowler-modal').style.display = 'none';
    updateUI();
}

function save() { history.push(JSON.stringify({state:JSON.parse(JSON.stringify(state)), p1:JSON.parse(JSON.stringify(p1)), p2:JSON.parse(JSON.stringify(p2)), isP1:striker===p1, currentBowler, lastBowler, inn1Data:JSON.parse(JSON.stringify(inn1Data)), inn2Data:JSON.parse(JSON.stringify(inn2Data))})); }
function undo() { if(history.length > 0) { let l = JSON.parse(history.pop()); state=l.state; p1=l.p1; p2=l.p2; striker=l.isP1?p1:p2; currentBowler=l.currentBowler; lastBowler=l.lastBowler; inn1Data=l.inn1Data; inn2Data=l.inn2Data; updateUI(); } }
</script>
</body>
</html>
